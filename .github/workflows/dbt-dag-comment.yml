name: dbt DAG Comment (Reusable)

on:
  workflow_call:
    inputs:
      dbt-project-dir:
        description: 'Path to the dbt project directory relative to the repository root'
        type: string
        required: true
      pr-number:
        description: 'Pull Request number'
        type: number
        required: true
      base-ref:
        description: 'Base branch name for git diff (e.g., main)'
        type: string
        required: true
      head-sha:
        description: 'SHA of the head commit of the PR'
        type: string
        required: true
      token:
        description: 'GITHUB_TOKEN for checking out the reusable workflow repository'
        type: string
        required: false
        default: ''

jobs:
  dag-comment:
    name: Generate DAG Comment
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Caller Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.head-sha }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Fetch base branch
        run: git fetch origin ${{ inputs.base-ref }}:${{ inputs.base-ref }} --no-tags

      - name: Detect adapter and install dbt
        run: |
          ADAPTER=$(grep -m1 "type:" ${{ inputs.dbt-project-dir }}/profiles.yml | awk '{print $2}' | tr -d '\r')
          echo "Detected adapter: $ADAPTER"
          uv pip install dbt-$ADAPTER --system

      - name: Get changed dbt files
        id: changed-files
        run: |
          changed=$(git diff --name-only ${{ inputs.base-ref }}...${{ inputs.head-sha }} -- \
            '${{ inputs.dbt-project-dir }}/models/' \
            '${{ inputs.dbt-project-dir }}/snapshots/' \
            | tr '\n' ' ')
          echo "files=$changed" >> $GITHUB_OUTPUT
          count=$(echo "$changed" | wc -w | tr -d ' ')
          echo "count=$count" >> $GITHUB_OUTPUT
          echo "Changed files ($count): $changed"

      - name: Checkout Reusable Workflow Repo
        uses: actions/checkout@v4
        with:
          repository: o6ivp/dbt-dag-comment-workflow
          path: ./.github/reusable_workflow_source
          token: ${{ inputs.token }}

      - name: Generate dbt manifest
        if: steps.changed-files.outputs.count != '0'
        working-directory: ${{ inputs.dbt-project-dir }}
        run: |
          python ../.github/reusable_workflow_source/.github/dbt/scripts/generate_ci_profile.py \
            --project-dir . \
            --output ~/.dbt/profiles.yml

          if [ -f "packages.yml" ]; then
            dbt deps
          fi
          dbt parse --no-partial-parse

      - name: Generate Mermaid DAG
        if: steps.changed-files.outputs.count != '0'
        run: |
          python ./.github/reusable_workflow_source/.github/dbt/scripts/generate_dag_mermaid.py \
            --manifest ${{ inputs.dbt-project-dir }}/target/manifest.json \
            --changed-files "${{ steps.changed-files.outputs.files }}" \
            --output dag_output.md \
            --all

      - name: Comment on PR
        if: steps.changed-files.outputs.count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const dagContent = fs.readFileSync('dag_output.md', 'utf8');

            const body = [
              '<!-- dbt-dag-bot -->',
              '## 📊 dbt Model Lineage',
              '',
              'This PR modifies dbt models. Below is the lineage diagram showing the changed models (highlighted in red) and their dependencies.',
              '',
              dagContent,
              '',
              '<details>',
              '<summary>Legend</summary>',
              '',
              '- 🔴 **Red**: Changed in this PR',
              '- ⬜ **Rectangle**: Models',
              '- 🛢️ **Cylinder**: Source tables',
              '- ⬡ **Hexagon**: Snapshots',
              '',
              '</details>',
              '',
              '---',
              '*Auto-generated by dbt DAG workflow*'
            ].join('\n');

            const issue_number = ${{ inputs.pr-number }};

            // 既存のボットコメントを検索
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number
            });

            const botComment = comments.find(c => c.body.includes('<!-- dbt-dag-bot -->'));

            if (botComment) {
              // 既存コメントを更新
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body
              });
              console.log('Updated existing comment');
            } else {
              // 新規コメントを作成
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body
              });
              console.log('Created new comment');
            }

      - name: No changes comment
        if: steps.changed-files.outputs.count == '0'
        run: |
          echo "No dbt model changes detected, skipping comment."

      - name: Cleanup
        if: always()
        run: |
          rm -f ~/.dbt/profiles.yml
          rm -rf ${{ inputs.dbt-project-dir }}/target/
          rm -f dag_output.md
